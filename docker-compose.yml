version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: memnuniyetimvar-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: memnuniyetimvar
      POSTGRES_USER: memnuniyetimvar
      POSTGRES_PASSWORD: memnuniyetimvar_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: memnuniyetimvar-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: memnuniyetimvar-search
    restart: unless-stopped
    ports:
      - '7701:7700'
    environment:
      MEILI_MASTER_KEY: memnuniyetimvar_dev_key
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: memnuniyetimvar-minio
    restart: unless-stopped
    ports:
      - '9002:9000'
      - '9003:9001'
    environment:
      MINIO_ROOT_USER: memnuniyetimvar
      MINIO_ROOT_PASSWORD: memnuniyetimvar_dev
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
